<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Simple Mobile AR Lab - Motor Status</title>

  <!-- Open-source libraries. The versions are pinned so A-Frame and AR.js match. -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }

    #top-panel {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(92vw, 520px);
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.68);
      color: white;
      text-align: center;
      font-size: 15px;
      line-height: 1.4;
      backdrop-filter: blur(4px);
    }

    #controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 12px;
    }

    button {
      min-width: 132px;
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    #run-button { background: #ffffff; color: #111111; }
    #status-button { background: #ffd54f; color: #111111; }

    .hint {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>

  <script>
    // A tiny reusable component that rotates an object without extra libraries.
    AFRAME.registerComponent('spin-control', {
      schema: {
        axis: { type: 'string', default: 'y' },
        speed: { type: 'number', default: 180 },
        active: { type: 'boolean', default: true }
      },

      tick: function (_time, deltaMs) {
        if (!this.data.active || !deltaMs) return;

        const radians = THREE.MathUtils.degToRad(this.data.speed * deltaMs / 1000);
        const axis = this.data.axis;

        if (axis === 'x') this.el.object3D.rotation.x += radians;
        if (axis === 'y') this.el.object3D.rotation.y += radians;
        if (axis === 'z') this.el.object3D.rotation.z += radians;
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const marker = document.querySelector('#hiro-marker');
      const shaft = document.querySelector('#shaft');
      const motorBody = document.querySelector('#motor-body');
      const warningLamp = document.querySelector('#warning-lamp');
      const arLabel = document.querySelector('#ar-label');
      const topPanel = document.querySelector('#top-panel');
      const runButton = document.querySelector('#run-button');
      const statusButton = document.querySelector('#status-button');

      let running = true;
      let warning = false;

      marker.addEventListener('markerFound', () => {
        topPanel.innerHTML = 'พบ Hiro Marker แล้ว — โมเดลมอเตอร์พร้อมใช้งาน<span class="hint">แตะปุ่มด้านล่างเพื่อทดลองควบคุม</span>';
      });

      marker.addEventListener('markerLost', () => {
        topPanel.innerHTML = 'เล็งกล้องไปที่ Hiro Marker<span class="hint">วาง Marker บนโต๊ะที่มีแสงเพียงพอและให้เห็นกรอบดำครบทั้งสี่ด้าน</span>';
      });

      runButton.addEventListener('click', () => {
        running = !running;
        shaft.setAttribute('spin-control', 'active', running);
        runButton.textContent = running ? 'หยุดมอเตอร์' : 'เริ่มมอเตอร์';
      });

      statusButton.addEventListener('click', () => {
        warning = !warning;

        if (warning) {
          motorBody.setAttribute('color', '#ef5350');
          warningLamp.setAttribute('color', '#ff1744');
          warningLamp.setAttribute('material', 'emissive', '#ff1744');
          arLabel.setAttribute('value', 'MOTOR M1\nSTATUS: WARNING');
          statusButton.textContent = 'เปลี่ยนเป็นปกติ';
        } else {
          motorBody.setAttribute('color', '#1976d2');
          warningLamp.setAttribute('color', '#00e676');
          warningLamp.setAttribute('material', 'emissive', '#00c853');
          arLabel.setAttribute('value', 'MOTOR M1\nSTATUS: NORMAL');
          statusButton.textContent = 'จำลองคำเตือน';
        }
      });
    });
  </script>
</head>

<body>
  <div id="top-panel">
    เล็งกล้องไปที่ Hiro Marker
    <span class="hint">อนุญาตให้เว็บไซต์ใช้กล้องเมื่อเบราว์เซอร์ถาม</span>
  </div>

  <div id="controls">
    <button id="run-button" type="button">หยุดมอเตอร์</button>
    <button id="status-button" type="button">จำลองคำเตือน</button>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; colorManagement: true"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false"
  >
    <a-marker
      id="hiro-marker"
      preset="hiro"
      emitevents="true"
      smooth="true"
      smooth-count="8"
      smooth-tolerance="0.01"
      smooth-threshold="3"
    >
      <!-- Floor plate -->
      <a-box
        position="0 0.04 0"
        width="1.35"
        height="0.08"
        depth="0.85"
        color="#455a64"
        roughness="0.8"
      ></a-box>

      <!-- Two mounting feet -->
      <a-box position="-0.42 0.15 0" width="0.18" height="0.18" depth="0.55" color="#263238"></a-box>
      <a-box position="0.42 0.15 0" width="0.18" height="0.18" depth="0.55" color="#263238"></a-box>

      <!-- Motor housing: cylinder lies along X axis -->
      <a-cylinder
        id="motor-body"
        position="0 0.47 0"
        rotation="0 0 90"
        radius="0.32"
        height="0.72"
        segments-radial="32"
        color="#1976d2"
        metalness="0.25"
        roughness="0.55"
      ></a-cylinder>

      <!-- Rear cap -->
      <a-cylinder
        position="-0.40 0.47 0"
        rotation="0 0 90"
        radius="0.27"
        height="0.12"
        color="#90a4ae"
      ></a-cylinder>

      <!-- Shaft assembly: parent fixes the shaft direction; child spins locally -->
      <a-entity position="0.52 0.47 0" rotation="0 0 90">
        <a-cylinder
          id="shaft"
          radius="0.09"
          height="0.42"
          color="#cfd8dc"
          metalness="0.8"
          roughness="0.2"
          spin-control="axis: y; speed: 220; active: true"
        >
          <a-box position="0 0.12 0.09" width="0.05" height="0.18" depth="0.06" color="#ffeb3b"></a-box>
        </a-cylinder>
      </a-entity>

      <!-- Status lamp -->
      <a-sphere
        id="warning-lamp"
        position="0 0.87 0"
        radius="0.075"
        color="#00e676"
        material="emissive: #00c853; emissiveIntensity: 0.8"
      ></a-sphere>

      <!-- AR information label -->
      <a-text
        id="ar-label"
        value="MOTOR M1\nSTATUS: NORMAL"
        position="0 1.12 0"
        rotation="-90 0 0"
        align="center"
        width="2.4"
        color="#ffffff"
        side="double"
      ></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
